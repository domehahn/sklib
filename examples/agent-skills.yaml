version: 1
default_registry: main

registries:
  main:
    type: skillforge
    url: https://registry.example.com
    auth:
      type: token
      token_env: SKILLFORGE_TOKEN
    endpoints:
      capabilities: /capabilities
      resolve: /skills/{namespace}/{name}/resolve
      download: /skills/{namespace}/{name}/{version}/dl

  internal:
    type: generic-http
    url: https://internal-registry.corp.example.com
    auth:
      type: header
      header_name: X-Registry-Token
      token_env: INTERNAL_REGISTRY_TOKEN

skills:
  - name: gitlab-policy-reviewer
    namespace: myorg
    version: "^1.5.0"
    source: main

  - name: pr-summarizer
    namespace: myorg
    version: "2.0.0"
    source: main
    platforms:
      - claude-code
      - gitlab-duo

  - name: local-helper
    path: ./skills/local-helper
